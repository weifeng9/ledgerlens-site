<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ledgerlens — High-quality 高级功能预约</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font:16px/1.6 -apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
       background:#0d1117;color:#e6edf3;display:flex;min-height:100vh;
       align-items:center;justify-content:center;padding:24px}
  .card{max-width:480px;width:100%;background:#161b22;border:1px solid #222a35;
        border-radius:16px;padding:36px}
  .brand{font-size:13px;letter-spacing:3px;color:#6b7785;text-transform:uppercase;margin-bottom:18px}
  h1{font-size:26px;line-height:1.3;margin-bottom:12px}
  p{color:#9aa7b4;font-size:15px;margin-bottom:22px}
  label{display:block;font-size:14px;color:#9aa7b4;margin:14px 0 6px}
  input,textarea{width:100%;background:#0b0f14;border:1px solid #2a3342;border-radius:9px;
        padding:12px 14px;color:#e6edf3;font-size:15px}
  input:focus,textarea:focus{outline:none;border-color:#3b82f6}
  button{width:100%;margin-top:22px;background:#3b82f6;color:#fff;border:0;border-radius:9px;
         padding:14px;font-size:16px;font-weight:600;cursor:pointer}
  button:hover{background:#2f6fd6}
  .ok{display:none;text-align:center;padding:20px 0}
  .ok .check{font-size:54px;color:#3fb950}
  .ok h2{font-size:22px;margin:12px 0 8px}
  .small{font-size:13px;color:#6b7785;margin-top:18px;text-align:center}
</style>
</head>
<body>
  <div class="card">
    <div id="form-wrap">
      <div class="brand">Ledgerlens</div>
      <h1>预约 High-quality 高级功能</h1>
      <p>你的文档是扫描件或含复杂表格,需要高质量 OCR + 表格识别功能。
         留下邮箱,功能就绪后第一时间通知你。</p>
      <form id="form" action="https://formspree.io/f/mzdlplqd" method="POST">
        <label for="email">你的邮箱 *</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />

        <label for="role">你的身份(选填)</label>
        <input type="text" id="role" name="role" placeholder="会计师 / Bookkeeper / 税务顾问…" />

        <label for="note">想说的话(选填)</label>
        <textarea id="note" name="note" rows="2" placeholder="你最常处理什么类型的文档?"></textarea>

        <!-- 自动带上的文档信息(由 app 通过 URL 参数填入) -->
        <input type="hidden" id="doc_info" name="doc_info" value="" />
        <input type="hidden" name="_subject" value="Ledgerlens — 有人预约 High-quality 功能" />

        <button type="submit">提交预约</button>
      </form>
      <div class="small">我们只用这个邮箱通知你功能上线,不做他用。</div>
    </div>

    <div class="ok" id="ok">
      <div class="check">✓</div>
      <h2>预约成功!</h2>
      <p>功能就绪后会用邮件通知你。可以关闭这个页面了。</p>
    </div>
  </div>

<script>
  // 从 URL 参数把 app 传来的文档信息填进隐藏字段(如 ?pages=16&scanned=true)
  const params = new URLSearchParams(location.search);
  const info = [];
  if (params.get('pages')) info.push(params.get('pages') + ' 页');
  if (params.get('scanned') === 'true') info.push('扫描件');
  if (params.get('tables') === 'true') info.push('含表格');
  document.getElementById('doc_info').value = info.join(', ') || '(未提供)';

  // 用 fetch 提交,避免跳转到 Formspree 默认页;成功后显示本页的感谢状态
  const form = document.getElementById('form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = new FormData(form);
    try {
      const res = await fetch(form.action, {
        method: 'POST', body: data, headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('ok').style.display = 'block';
      } else {
        alert('提交失败,请稍后再试,或直接邮件联系 unchipstec@gmail.com');
      }
    } catch (err) {
      alert('网络错误,请稍后再试,或直接邮件联系 unchipstec@gmail.com');
    }
  });
</script>
</body>
</html>
